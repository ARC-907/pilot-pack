<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browser Automation Test Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: 32px auto;
      padding: 0 20px;
      color: #222;
      background: #f7f7f4;
    }
    main {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 24px;
    }
    label {
      display: block;
      margin-top: 16px;
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 10px;
      border: 1px solid #aaa;
      border-radius: 4px;
      font: inherit;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .checkline {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 16px;
    }
    .checkline input {
      width: auto;
      margin: 0;
    }
    button {
      margin-top: 20px;
      padding: 10px 14px;
      border: 0;
      border-radius: 4px;
      background: #2457a6;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    #result {
      margin-top: 18px;
      padding: 12px;
      border-radius: 4px;
      background: #eef7ee;
      border: 1px solid #b8d8b8;
      display: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Browser Automation Test Form</h1>
    <p>This page is only for local setup testing. Use fake data.</p>

    <form id="testForm">
      <div class="row">
        <div>
          <label for="firstName">First Name</label>
          <input id="firstName" name="firstName" autocomplete="off" required>
        </div>
        <div>
          <label for="lastName">Last Name</label>
          <input id="lastName" name="lastName" autocomplete="off" required>
        </div>
      </div>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="off" required>

      <label for="reason">Reason</label>
      <select id="reason" name="reason" required>
        <option value="">Choose one</option>
        <option>Testing setup</option>
        <option>Learning browser automation</option>
        <option>Checking form behavior</option>
      </select>

      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="4"></textarea>

      <label class="checkline" for="reviewed">
        <input id="reviewed" name="reviewed" type="checkbox">
        I reviewed this fake test data before submitting.
      </label>

      <button type="submit">Submit Test Form</button>
    </form>

    <div id="result" role="status" aria-live="polite"></div>
  </main>

  <script>
    document.getElementById('testForm').addEventListener('submit', function (event) {
      event.preventDefault();
      var formData = new FormData(event.target);
      var fullName = (formData.get('firstName') || '') + ' ' + (formData.get('lastName') || '');
      var result = document.getElementById('result');
      result.style.display = 'block';
      result.textContent = 'Submitted locally for test user: ' + fullName.trim() + '. No network request was sent.';
    });
  </script>
</body>
</html>
